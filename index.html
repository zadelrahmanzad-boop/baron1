<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARON POS - تسجيل الدخول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #16213e; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-box h1 { color: #e94560; text-align: center; margin-bottom: 10px; font-size: 28px; }
        .login-box p { color: #a0a0a0; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { color: #fff; display: block; margin-bottom: 8px; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px 15px; border: 2px solid #0f3460; border-radius: 8px; background: #0f3460; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #e94560; }
        .btn-login { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-login:hover { background: #c13651; transform: translateY(-2px); }
        .btn-login:disabled { background: #555; cursor: not-allowed; transform: none; }
        .error-msg { color: #ff6b6b; text-align: center; margin-top: 15px; display: none; font-size: 14px; padding: 10px; background: rgba(255,0,0,0.1); border-radius: 5px; }
        .success-msg { color: #28a745; text-align: center; margin-top: 15px; display: none; font-size: 14px; padding: 10px; background: rgba(0,255,0,0.1); border-radius: 5px; }
        .info { color: #888; text-align: center; margin-top: 20px; font-size: 13px; }
        .loading { display: none; text-align: center; color: #e94560; margin-top: 10px; }
        .debug-info { color: #666; font-size: 11px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🍔 BARON POS</h1>
        <p>نظام كاشير المطاعم الذكي</p>
        
        <div class="input-group">
            <label>📧 البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="cashier1@baron.com" value="cashier1@baron.com">
        </div>
        
        <div class="input-group">
            <label>🔒 كلمة المرور</label>
            <input type="password" id="password" placeholder="123456" value="123456">
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="login()">تسجيل الدخول</button>
        <div class="loading" id="loading">⏳ جاري تسجيل الدخول...</div>
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        
        <p class="info">ℹ️ إنشاء الحسابات متاح للمدير فقط</p>
        <p class="debug-info" id="debugInfo"></p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP2XqvPp7UpF_i1Yhq69QTkMLdAlbVD0w",
            authDomain: "caheir-d3e62.firebaseapp.com",
            projectId: "caheir-d3e62",
            storageBucket: "caheir-d3e62.firebasestorage.app",
            messagingSenderId: "274782108081",
            appId: "1:274782108081:web:717f6229b0d27f16b5e590",
            measurementId: "G-M2P0KK4DDS"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            console.log("✅ Firebase initialized successfully");

            // لو مسجل دخوله مسبقاً، وجهه للموقع الثاني
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    console.log("👤 User already logged in:", user.email);
                    window.location.href = 'https://zadelrahmanzad-boop.github.io/baron2/';
                }
            });

            window.login = async function() {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginBtn');
                const loading = document.getElementById('loading');
                const errorMsg = document.getElementById('errorMsg');
                const successMsg = document.getElementById('successMsg');
                const debugInfo = document.getElementById('debugInfo');

                if (!email || !password) {
                    showError('❌ من فضلك أدخل البريد وكلمة المرور');
                    return;
                }

                loginBtn.disabled = true;
                loading.style.display = 'block';
                errorMsg.style.display = 'none';
                successMsg.style.display = 'none';

                try {
                    console.log("🔑 Attempting login with:", email);
                    
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    console.log("✅ Login successful:", user.uid);

                    // جلب اسم المستخدم من Firestore
                    let userName = email.split('@')[0];
                    try {
                        const userDoc = await getDoc(doc(db, "users", user.uid));
                        if (userDoc.exists()) {
                            userName = userDoc.data().name || userName;
                            console.log("📄 User data from Firestore:", userDoc.data());
                        }
                    } catch (e) {
                        console.log("⚠️ Could not fetch user data:", e.message);
                    }

                    const userData = {
                        uid: user.uid,
                        email: user.email,
                        name: userName,
                        loginTime: new Date().toISOString()
                    };

                    localStorage.setItem('baron_current_user', JSON.stringify(userData));
                    
                    successMsg.innerText = '✅ تم تسجيل الدخول! جاري التوجيه...';
                    successMsg.style.display = 'block';
                    debugInfo.innerText = 'UID: ' + user.uid;

                    setTimeout(() => {
                        window.location.href = 'https://zadelrahmanzad-boop.github.io/baron2/';
                    }, 1500);

                } catch (error) {
                    console.error("❌ Login error:", error.code, error.message);
                    let message = '❌ ';
                    switch(error.code) {
                        case 'auth/user-not-found': 
                            message += 'هذا البريد غير مسجل في النظام'; 
                            break;
                        case 'auth/wrong-password': 
                            message += 'كلمة المرور غير صحيحة'; 
                            break;
                        case 'auth/invalid-email': 
                            message += 'البريد الإلكتروني غير صالح'; 
                            break;
                        case 'auth/invalid-credential': 
                            message += 'البريد أو كلمة المرور خطأ'; 
                            break;
                        case 'auth/too-many-requests': 
                            message += 'تم حظر المحاولات مؤقتاً'; 
                            break;
                        case 'auth/network-request-failed':
                            message += 'مشكلة في الاتصال بالإنترنت';
                            break;
                        default: 
                            message += error.message;
                    }
                    showError(message);
                    debugInfo.innerText = 'Error: ' + error.code;
                } finally {
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            };

            function showError(msg) {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.innerText = msg;
                errorMsg.style.display = 'block';
            }

            // Enter key
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') window.login();
            });

        } catch (initError) {
            console.error("❌ Firebase init error:", initError);
            document.getElementById('errorMsg').innerText = '❌ خطأ في تهيئة Firebase: ' + initError.message;
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
