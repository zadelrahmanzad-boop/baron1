<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام الكاشير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 25px; }
        .logo h1 { font-size: 28px; color: #333; }
        .logo p { color: #888; font-size: 14px; margin-top: 5px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        input {
            width: 100%; padding: 13px 15px; border: 2px solid #e8e8e8; border-radius: 12px;
            font-size: 15px; font-family: 'Cairo', sans-serif; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        .btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-family: 'Cairo', sans-serif; margin-top: 10px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            padding: 12px 15px; border-radius: 10px; margin-bottom: 15px; font-size: 14px;
            display: none; text-align: center;
        }
        .message.show { display: block; }
        .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .message.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .message.warning { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        .spinner {
            display: none; width: 20px; height: 20px; border: 2px solid #fff;
            border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-box {
            background: #f8f9ff; border-right: 4px solid #667eea; padding: 12px 15px;
            border-radius: 10px; margin-bottom: 20px; font-size: 13px; color: #555;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🛒 نظام الكاشير</h1>
            <p>تسجيل الدخول للنظام</p>
        </div>
        <div class="info-box">
            ℹ️ إنشاء الحسابات متاح للمدير فقط من لوحة التحكم.
        </div>
        <div id="message" class="message"></div>
        <form id="loginForm">
            <div class="input-group">
                <label>📧 البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label>🔒 كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">
                <span class="spinner" id="loginSpinner"></span>
                دخول
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDf_FZ5dDhJCYag9EpEblgylTrxber7oks",
            authDomain: "cashier-52332.firebaseapp.com",
            projectId: "cashier-52332",
            storageBucket: "cashier-52332.firebasestorage.app",
            messagingSenderId: "708122460779",
            appId: "1:708122460779:web:5c0fb2f36488aa6ae3272e",
            measurementId: "G-8BLM2L0LN5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    // المدير معفى من فحص الصلاحية
                    if (data.role !== 'admin' && data.expiresAt && data.expiresAt.toDate) {
                        const now = new Date();
                        const expires = data.expiresAt.toDate();
                        if (now > expires) {
                            await auth.signOut();
                            showMessage('⛔ حسابك منتهي الصلاحية. تواصل مع المدير.', 'error');
                            return;
                        }
                    }
                }
                window.location.href = "dashboard.html";
            }
        });

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message show ' + type;
        }
        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            hideMessage();

            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                const user = cred.user;
                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (!userDoc.exists()) {
                    await auth.signOut();
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    showMessage('❌ بيانات المستخدم غير موجودة في النظام', 'error');
                    return;
                }

                const data = userDoc.data();
                if (data.status === 'disabled') {
                    await auth.signOut();
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    showMessage('⛔ حسابك معطل. تواصل مع المدير.', 'error');
                    return;
                }

                // فحص الصلاحية - المدير معفى
                if (data.role !== 'admin' && data.expiresAt && data.expiresAt.toDate) {
                    const now = new Date();
                    const expires = data.expiresAt.toDate();
                    const daysLeft = Math.ceil((expires - now) / (1000 * 60 * 60 * 24));

                    if (now > expires) {
                        await auth.signOut();
                        btn.disabled = false;
                        spinner.style.display = 'none';
                        showMessage('⛔ انتهت صلاحية حسابك. تواصل مع المدير.', 'error');
                        return;
                    }

                    if (daysLeft <= 3) {
                        showMessage('⚠️ صلاحية حسابك تنتهي خلال ' + daysLeft + ' أيام', 'warning');
                    }
                }

                await updateDoc(doc(db, "users", user.uid), { lastLogin: serverTimestamp() });
            } catch (err) {
                btn.disabled = false;
                spinner.style.display = 'none';
                let msg = 'حدث خطأ';
                if (err.code === 'auth/user-not-found') msg = '❌ البريد غير مسجل';
                else if (err.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
                else if (err.code === 'auth/invalid-email') msg = '❌ بريد غير صالح';
                else if (err.code === 'auth/too-many-requests') msg = '❌ محاولات كثيرة، حاول لاحقاً';
                else msg = '❌ ' + err.message;
                showMessage(msg, 'error');
            }
        });
    </script>
</body>
</html>
